<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Updates · Admin · İDİGNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#05101e;--deep:#081828;--cyan:#22d3ee;--muted:#7a9bb5;--card:#0b1f30;--border:rgba(34,211,238,0.15);}
    *{box-sizing:border-box}
    body{margin:0;background:var(--navy);color:#e2eaf4;font-family:'Outfit',sans-serif}
    header{position:sticky;top:0;background:rgba(5,16,30,0.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;z-index:10}
    header .brand{font-family:'Cinzel',serif;letter-spacing:0.08em;color:var(--cyan);font-weight:900;text-decoration:none}
    header a{color:var(--muted);text-decoration:none;margin-left:1rem}
    main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;display:grid;grid-template-columns:1.2fr 0.8fr;gap:1.25rem}
    @media(max-width:960px){main{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem}
    h1{margin:0 0 1rem;font-family:'Cinzel',serif;color:#fff;font-size:1.4rem}
    .muted{color:var(--muted)}
    .update{border:1px solid rgba(34,211,238,0.12);border-radius:10px;padding:1rem;margin-top:0.75rem;background:rgba(8,24,40,0.35)}
    .utitle{display:flex;align-items:baseline;justify-content:space-between;gap:1rem}
    .utitle h3{margin:0;font-size:1rem;color:#fff}
    .udate{color:var(--muted);font-size:0.85rem}
    .ubody{color:#cfe2f6;opacity:0.9;margin-top:0.5rem;white-space:pre-wrap;line-height:1.7}
    .btn{display:inline-block;border:1px solid var(--border);color:var(--cyan);text-decoration:none;padding:0.45rem 0.7rem;border-radius:8px;font-size:0.85rem;background:transparent;cursor:pointer}
    .btn:hover{background:rgba(34,211,238,0.08)}
    .btn-danger{border-color:rgba(255,180,180,0.25);color:#ffb4b4}
    .btn-danger:hover{background:rgba(255,0,0,0.08)}
    form.inline{display:inline}
    label{display:block;color:var(--muted);font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;margin:0.9rem 0 0.35rem}
    input,textarea{width:100%;padding:0.75rem 0.85rem;border-radius:8px;border:1px solid var(--border);background:rgba(8,24,40,0.7);color:#e2eaf4;outline:none}
    textarea{min-height:160px;resize:vertical}
    input:focus,textarea:focus{border-color:rgba(34,211,238,0.45)}
    .err{margin-top:1rem;color:#ffb4b4;background:rgba(255,0,0,0.08);border:1px solid rgba(255,180,180,0.25);padding:0.75rem 0.9rem;border-radius:8px}
  </style>
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('admin_panel') }}">İDİGNA · Admin</a>
    <div>
      <a href="{{ url_for('admin_panel') }}">Overview</a>
      <a href="{{ url_for('admin_sponsors') }}">Sponsors</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </div>
  </header>

  <main>
    <section class="card">
      <h1>Weekly updates</h1>
      <p class="muted">Newest first. Visible to all sponsors.</p>
      {% for u in updates %}
        <div class="update">
          <div class="utitle">
            <h3>{{ u["title"] }}</h3>
            <div class="udate">{{ u["date"] }}</div>
          </div>
          <div class="ubody">{{ u["body"] }}</div>
          <div style="margin-top:0.75rem">
            <form class="inline" method="post" action="{{ url_for('admin_delete_update', update_id=u['id']) }}" onsubmit="return confirm('Delete update?');">
              <button class="btn btn-danger" type="submit">Delete</button>
            </form>
          </div>
        </div>
      {% endfor %}
    </section>

    <aside class="card">
      <h1>Post update</h1>
      <form method="post" action="{{ url_for('admin_updates') }}">
        <label for="title">Title</label>
        <input id="title" name="title" required />

        <label for="date">Date</label>
        <input id="date" name="date" type="date" value="{{ today }}" required />

        <label for="body">Body</label>
        <textarea id="body" name="body" required></textarea>

        <div style="margin-top:1.2rem">
          <button class="btn" type="submit">Create update</button>
        </div>

        {% if error %}
          <div class="err">{{ error }}</div>
        {% endif %}
      </form>
    </aside>
  </main>
</body>
</html>
