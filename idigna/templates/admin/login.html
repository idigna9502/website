<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login · İDİGNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#05101e; --deep:#081828; --teal:#0e7490; --cyan:#22d3ee; --wave:#38bdf8; --gold:#f0c040; --text:#e2eaf4; --muted:#7a9bb5; --card:#0b1f30; --border:rgba(34,211,238,0.15);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Outfit',sans-serif;background:#05101e;color:#e2eaf4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    h1,h2,h3{font-family:'Cinzel',serif}
    .lang-btn{
      position:fixed;top:14px;right:14px;z-index:2000;
      background:none;border:1px solid var(--border);
      color:var(--cyan);padding:0.35rem 0.85rem;
      border-radius:6px;cursor:pointer;
      font-family:'Outfit',sans-serif;font-size:0.8rem;
      letter-spacing:0.08em;transition:all 0.2s;
    }
    .lang-btn:hover{background:var(--cyan);color:var(--navy)}
    .wrap{width:100%;max-width:440px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:2rem}
    h1{margin:0 0 1rem;letter-spacing:0.06em;font-size:1.4rem;color:#fff}
    p{margin:0 0 1.5rem;color:var(--muted);line-height:1.6}
    label{display:block;color:var(--muted);font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.35rem}
    input{width:100%;padding:0.8rem 0.9rem;border-radius:8px;border:1px solid var(--border);background:rgba(8,24,40,0.7);color:#e2eaf4;outline:none}
    input:focus{border-color:rgba(34,211,238,0.45)}
    .row{margin-top:1rem}
    .btn{margin-top:1.2rem;width:100%;background:var(--cyan);color:var(--navy);border:none;border-radius:8px;padding:0.85rem 1rem;font-weight:700;cursor:pointer}
    .err{margin-top:1rem;color:#ffb4b4;background:rgba(255,0,0,0.08);border:1px solid rgba(255,180,180,0.25);padding:0.75rem 0.9rem;border-radius:8px}
    a{color:var(--cyan);text-decoration:none}
  </style>
</head>
<body>
  <button class="lang-btn" type="button" id="langToggle">EN</button>
  <div class="wrap">
    <h1 data-i18n="admin.login.title">Admin Login</h1>
    <form method="post" action="{{ url_for('admin_login') }}">
      <div class="row">
        <label for="username" data-i18n="admin.login.username">Username</label>
        <input id="username" name="username" autocomplete="username" required />
      </div>
      <div class="row">
        <label for="password" data-i18n="admin.login.password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit" data-i18n="admin.login.submit">Log in</button>
      {% if error %}
        <div class="err" data-i18n-err="invalid_admin">{{ error }}</div>
      {% endif %}
    </form>
    <p style="margin-top:1.5rem"><a href="{{ url_for('index') }}" data-i18n="admin.login.back">← Back to site</a></p>
  </div>

  <script>
    const LANG_KEY = 'idigna_lang';
    const translations = {
      tr: {
        "admin.login.title":"Yönetici Girişi",
        "admin.login.help":"Giriş bilgileriniz Render ortam değişkenlerindedir (<code>ADMIN_USERNAME</code>, <code>ADMIN_PASSWORD</code>).",
        "admin.login.username":"Kullanıcı adı",
        "admin.login.password":"Şifre",
        "admin.login.submit":"Giriş yap",
        "admin.login.back":"← Siteye dön",
        "admin.err.invalid":"Geçersiz kimlik bilgileri"
      },
      en: {
        "admin.login.title":"Admin Login",
        "admin.login.help":"Use your Render environment variables (<code>ADMIN_USERNAME</code>, <code>ADMIN_PASSWORD</code>).",
        "admin.login.username":"Username",
        "admin.login.password":"Password",
        "admin.login.submit":"Log in",
        "admin.login.back":"← Back to site",
        "admin.err.invalid":"Invalid credentials"
      }
    };

    function getInitialLang() {
      try {
        const stored = localStorage.getItem(LANG_KEY);
        if (stored === 'tr' || stored === 'en') return stored;
      } catch (e) {}
      return navigator.language.startsWith('tr') ? 'tr' : 'en';
    }

    let currentLang = getInitialLang();

    function applyLang(lang) {
      currentLang = lang;
      try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
      document.documentElement.lang = lang;
      document.getElementById('langToggle').textContent = lang === 'tr' ? 'EN' : 'TR';

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) el.textContent = translations[lang][key];
      });
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const key = el.getAttribute('data-i18n-html');
        if (translations[lang][key]) el.innerHTML = translations[lang][key];
      });

      document.querySelectorAll('[data-i18n-err]').forEach(el => {
        const key = el.getAttribute('data-i18n-err');
        if (key === 'invalid_admin' && translations[lang]['admin.err.invalid']) {
          el.textContent = translations[lang]['admin.err.invalid'];
        }
      });

      document.title = lang === 'tr' ? 'Yönetici Girişi · İDİGNA' : 'Admin Login · İDİGNA';
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      applyLang(currentLang === 'tr' ? 'en' : 'tr');
    });

    applyLang(currentLang);

    window.addEventListener('storage', (e) => {
      if (e.key === LANG_KEY && (e.newValue === 'tr' || e.newValue === 'en')) {
        applyLang(e.newValue);
      }
    });
  </script>
</body>
</html>
